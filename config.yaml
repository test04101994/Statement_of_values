# --- AWS Bedrock ---
bedrock:
  aws_region: us-east-1
  model_id: us.amazon.nova-pro-v1:0
  inference_profile_arn: null
  aws_profile: null
  max_tokens: 4096
  embedding_model_id: amazon.titan-embed-text-v2:0

# --- Sheet Selection ---
sheets: null

# --- Embedding Matching ---
